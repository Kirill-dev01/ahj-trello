<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Trello Clone</title>
</head>

<body>
    <div class="board">
        <div class="column" data-column="todo">
            <div class="column-header">TODO</div>
            <div class="cards-list"></div>
            <div class="add-card-wrapper">
                <button class="add-card-btn">+ Add another card</button>
                <div class="add-card-form hidden">
                    <textarea class="card-input" placeholder="Enter a title for this card..."></textarea>
                    <div class="add-card-actions">
                        <button class="btn-save">Add Card</button>
                        <button class="btn-cancel">✖</button>
                    </div>
                </div>
            </div>
        </div>

        <div class="column" data-column="in-progress">
            <div class="column-header">IN PROGRESS</div>
            <div class="cards-list"></div>
            <div class="add-card-wrapper">
                <button class="add-card-btn">+ Add another card</button>
                <div class="add-card-form hidden">
                    <textarea class="card-input" placeholder="Enter a title for this card..."></textarea>
                    <div class="add-card-actions">
                        <button class="btn-save">Add Card</button>
                        <button class="btn-cancel">✖</button>
                    </div>
                </div>
            </div>
        </div>

        <div class="column" data-column="done">
            <div class="column-header">DONE</div>
            <div class="cards-list"></div>
            <div class="add-card-wrapper">
                <button class="add-card-btn">+ Add another card</button>
                <div class="add-card-form hidden">
                    <textarea class="card-input" placeholder="Enter a title for this card..."></textarea>
                    <div class="add-card-actions">
                        <button class="btn-save">Add Card</button>
                        <button class="btn-cancel">✖</button>
                    </div>
                </div>
            </div>
        </div>
    </div>
</body>

</html>
